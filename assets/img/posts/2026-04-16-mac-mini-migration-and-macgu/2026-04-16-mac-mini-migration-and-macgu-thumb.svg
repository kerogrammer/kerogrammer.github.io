    <linearGradient id="metal" x1="0" y1="18" x2="302" y2="18" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#C2C8D0"/>
      <stop offset="0.18" stop-color="#F7F7F8"/>
