<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">맥 미니 마이그레이션 기념 썸네일</title>
  <desc id="desc">4월 15일 도착한 맥 미니 M4를 4월 16일 세팅하며 맥구라는 애칭과 OpenClaw 전용 머신의 의미를 담은 블로그 썸네일</desc>
  <rect width="1200" height="630" fill="#F5F7FA"/>
  <rect x="38" y="38" width="1124" height="554" rx="34" fill="url(#panel)"/>

  <circle cx="1048" cy="110" r="58" fill="#E6EEF9"/>
  <circle cx="1048" cy="110" r="36" fill="#FFFFFF"/>
  <path d="M1030 110H1066" stroke="#1C1C1E" stroke-width="8" stroke-linecap="round"/>
  <path d="M1048 92V128" stroke="#1C1C1E" stroke-width="8" stroke-linecap="round"/>

  <text x="86" y="146" fill="#3659B3" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">2026.04.16 MAC MINI MIGRATION</text>
  <text x="86" y="222" fill="#121417" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="700">드디어 도착한 맥 미니,</text>
  <text x="86" y="302" fill="#121417" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="700">오늘부터는 "맥구"</text>
  <text x="88" y="360" fill="#4B5563" font-family="Arial, Helvetica, sans-serif" font-size="29">배송일 2026.04.15  /  세팅 시작 2026.04.16  /  OpenClaw 전용 머신</text>

  <g transform="translate(92 426)">
    <rect width="222" height="58" rx="29" fill="#111827"/>
    <text x="35" y="38" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">#맥구</text>
  </g>
  <g transform="translate(332 426)">
    <rect width="260" height="58" rx="29" fill="#E7EEF9"/>
    <text x="30" y="38" fill="#24458F" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">#OpenClaw</text>
  </g>
  <g transform="translate(610 426)">
    <rect width="286" height="58" rx="29" fill="#EAF6EE"/>
    <text x="28" y="38" fill="#216E4A" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">#기본형_선택</text>
  </g>

  <g transform="translate(760 180)">
    <rect x="0" y="18" width="302" height="210" rx="28" fill="url(#metal)"/>
    <rect x="0" y="180" width="302" height="48" rx="0" fill="#1D1D1F"/>
    <ellipse cx="151" cy="210" rx="120" ry="11" fill="#0E1013" fill-opacity="0.45"/>
    <circle cx="214" cy="69" r="9" fill="#0F172A"/>
    <circle cx="246" cy="69" r="6" fill="#F8FAFC"/>
    <rect x="58" y="72" width="11" height="56" rx="5.5" fill="#1F2937"/>
    <rect x="104" y="72" width="11" height="56" rx="5.5" fill="#1F2937"/>
    <rect x="144" y="72" width="11" height="56" rx="5.5" fill="#1F2937"/>
    <g transform="translate(-102 72)">
      <rect x="0" y="0" width="132" height="84" rx="16" fill="#FFFFFF" fill-opacity="0.92"/>
      <text x="18" y="32" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">WIN DESKTOP</text>
      <text x="18" y="59" fill="#4B5563" font-family="Arial, Helvetica, sans-serif" font-size="18">게임용 메인 PC</text>
      <path d="M132 42H166" stroke="#B6C2D2" stroke-width="6" stroke-linecap="round"/>
    </g>
  </g>

