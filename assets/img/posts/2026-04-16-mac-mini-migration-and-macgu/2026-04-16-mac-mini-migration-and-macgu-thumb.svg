<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">맥구 세팅 시작 썸네일</title>
  <desc id="desc">맥 미니가 도착한 뒤 맥북에서 맥 미니로 환경을 옮기며 맥구라는 애칭을 붙인 이야기를 담은 심플한 블로그 썸네일</desc>
  <rect width="1200" height="630" fill="#F5F7FA"/>
  <rect x="48" y="48" width="1104" height="534" rx="32" fill="#FFFFFF"/>

  <text x="96" y="145" fill="#2563EB" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">MAC MINI MIGRATION</text>
  <text x="96" y="235" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="68" font-weight="700">맥 미니가 도착했고</text>
  <text x="96" y="315" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="68" font-weight="700">오늘부터는 맥구</text>
  <text x="98" y="376" fill="#4B5563" font-family="Arial, Helvetica, sans-serif" font-size="30">4월 15일 배송 완료, 4월 16일 마이그레이션 시작</text>

  <g transform="translate(96 442)">
    <rect width="190" height="72" rx="20" fill="#111827"/>
    <text x="48" y="46" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">#맥구</text>
  </g>
  <g transform="translate(306 442)">
    <rect width="248" height="72" rx="20" fill="#EEF2FF"/>
    <text x="33" y="46" fill="#1D4ED8" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">#OpenClaw</text>
  </g>

  <g transform="translate(786 165)">
    <rect x="0" y="0" width="258" height="190" rx="28" fill="#D1D5DB"/>
    <rect x="0" y="132" width="258" height="58" rx="0" fill="#1F2937"/>
    <circle cx="185" cy="55" r="8" fill="#111827"/>
    <circle cx="214" cy="55" r="5" fill="#F8FAFC"/>
    <rect x="48" y="59" width="10" height="38" rx="5" fill="#1F2937"/>
    <rect x="86" y="59" width="10" height="38" rx="5" fill="#1F2937"/>
    <ellipse cx="129" cy="198" rx="104" ry="12" fill="#CBD5E1"/>
  </g>

  <text x="786" y="414" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">작고 조용한 OpenClaw 머신</text>
</svg>
