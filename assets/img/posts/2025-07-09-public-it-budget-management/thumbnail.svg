<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">공공기관 예산 관리 썸네일</title>
  <desc id="desc">예산표와 계산기를 바탕으로 공공기관 전산직 예산 관리를 시각화한 썸네일</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#172554"/>
      <stop offset=".55" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity=".32"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g opacity=".16" fill="none" stroke="#fff" stroke-width="2">
    <path d="M110 120h980M110 210h980M110 300h980M110 390h980M110 480h980"/>
    <path d="M210 80v480M390 80v480M570 80v480M750 80v480M930 80v480"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="102" y="96" width="560" height="438" rx="26" fill="#f8fafc"/>
    <rect x="142" y="138" width="480" height="58" rx="14" fill="#dbeafe"/>
    <g fill="#0f172a" font-family="Arial, sans-serif" font-weight="700">
      <text x="164" y="176" font-size="26">사업 예산표</text>
      <text x="760" y="202" font-size="54" fill="#fff">전산직도</text>
      <text x="760" y="274" font-size="76" fill="#fff">예산을</text>
      <text x="760" y="358" font-size="76" fill="#fff">짭니다</text>
    </g>
    <g fill="#334155" font-family="Arial, sans-serif" font-size="24">
      <text x="150" y="252">SW 유지관리</text><text x="485" y="252">42,000</text>
      <text x="150" y="312">라이선스</text><text x="510" y="312">8,500</text>
      <text x="150" y="372">기능개선</text><text x="490" y="372">31,200</text>
      <text x="150" y="432">보안점검</text><text x="510" y="432">6,800</text>
    </g>
    <rect x="725" y="412" width="330" height="84" rx="20" fill="#ffffff" opacity=".92"/>
    <text x="760" y="467" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#0f766e">부서 살림살이 관리</text>
  </g>
</svg>
