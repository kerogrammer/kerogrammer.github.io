  <circle cx="1300" cy="150" r="140" stroke="#f2c66d" stroke-opacity="0.15" stroke-width="2"/>
  <circle cx="1300" cy="150" r="200" stroke="#f2c66d" stroke-opacity="0.1" stroke-width="2"/>
  <circle cx="1300" cy="150" r="270" stroke="#f2c66d" stroke-opacity="0.06" stroke-width="2"/>
  <!-- Trophy icon -->
  <path d="M230 260L270 180H370L410 260L350 340H290L230 260Z" fill="url(#gold-shine)" fill-opacity="0.12" stroke="#ffd700" stroke-opacity="0.3" stroke-width="1.5"/>
  <text x="275" y="280" fill="#ffd700" fill-opacity="0.25" font-family="Pretendard, sans-serif" font-size="58" font-weight="800">★</text>
  <!-- Score badge -->
  <rect x="120" y="550" width="160" height="90" rx="12" fill="#ffd700" fill-opacity="0.12" stroke="#ffd700" stroke-opacity="0.3" stroke-width="1.5"/>
  <text x="200" y="600" fill="#ffd700" fill-opacity="0.5" font-family="Pretendard, sans-serif" font-size="44" font-weight="800" text-anchor="middle">44점</text>
  <text x="200" y="628" fill="#e4c891" fill-opacity="0.4" font-family="Pretendard, sans-serif" font-size="14" text-anchor="middle">시즌 최고 점수</text>
  <!-- Main card -->
  <rect x="450" y="140" width="700" height="340" rx="20" fill="url(#card)" fill-opacity="0.92" stroke="#f2c66d" stroke-opacity="0.32" stroke-width="1.5"/>
  <text x="500" y="215" fill="#f0d8a8" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="30" font-weight="700">시즌 28 · 게임 8</text>
  <text x="500" y="295" fill="#fff7ea" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="62" font-weight="800">44점, 시즌 최고!</text>
  <text x="500" y="365" fill="#ffd700" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="36" font-weight="700">12점 달성으로 압도적 1위</text>
  <text x="500" y="430" fill="#e4c891" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="24">듄 임페리움 소규모 전투 시즌 28</text>
  <text x="500" y="465" fill="#cda35b" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="21">헬레나 리체스 · 영원한 전쟁 · 탐험과 프레멘의 시너지</text>
