<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0d14"/>
      <stop offset="40%" stop-color="#1a1208"/>
      <stop offset="100%" stop-color="#c5893a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(800 450) rotate(0) scale(600 400)">
      <stop stop-color="#ffd700" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#ffd700" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sun" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1300 120) rotate(90) scale(280 280)">
      <stop stop-color="#ffd27a" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#ffd27a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9b6a34" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#c8904d" stop-opacity="0.45"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1218"/>
      <stop offset="100%" stop-color="#232a36"/>
    </linearGradient>
    <linearGradient id="gold-shine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="50%" stop-color="#ffed8a"/>
      <stop offset="100%" stop-color="#daa520"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>
  <rect width="1600" height="900" fill="url(#sun)"/>
  <path d="M0 660C200 610 380 575 520 600C680 628 790 720 950 730C1100 739 1280 640 1600 570V900H0V660Z" fill="url(#sand)"/>
  <path d="M0 750C240 710 380 685 550 710C720 738 820 810 970 820C1150 832 1350 760 1600 690V900H0V750Z" fill="#2a1a10" fill-opacity="0.55"/>
