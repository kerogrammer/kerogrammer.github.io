<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#fcf8f0"/>
  <rect width="1200" height="200" fill="#e8d5b5" opacity="0.3"/>
  
  <!-- Stylized Sun/Light effect -->
  <circle cx="1100" cy="100" r="150" fill="#ffd700" opacity="0.1"/>
  
  <!-- Clock -->
  <g transform="translate(300, 315)">
    <circle cx="0" cy="0" r="180" fill="white" stroke="#5d4037" stroke-width="10"/>
    <!-- Hour marks -->
    <line x1="0" y1="-160" x2="0" y2="-140" stroke="#5d4037" stroke-width="6"/>
    <line x1="160" y1="0" x2="140" y2="0" stroke="#5d4037" stroke-width="6"/>
    <line x1="0" y1="160" x2="0" y2="140" stroke="#5d4037" stroke-width="6"/>
    <line x1="-160" y1="0" x2="-140" y2="0" stroke="#5d4037" stroke-width="6"/>
    
    <!-- Hour hand (approx 12:45) -->
    <line x1="0" y1="0" x2="30" y2="-50" stroke="#5d4037" stroke-width="12" stroke-linecap="round"/>
    <!-- Minute hand (at 45 min) -->
    <line x1="0" y1="0" x2="-120" y2="0" stroke="#d84315" stroke-width="8" stroke-linecap="round"/>
    
    <circle cx="0" cy="0" r="10" fill="#5d4037"/>
  </g>
  
  <!-- Documents -->
  <g transform="translate(700, 200)">
    <rect x="0" y="20" width="250" height="320" rx="10" fill="white" stroke="#cfd8dc" stroke-width="2"/>
    <rect x="20" y="10" width="250" height="320" rx="10" fill="white" stroke="#cfd8dc" stroke-width="2"/>
    <rect x="40" y="0" width="250" height="320" rx="10" fill="white" stroke="#607d8b" stroke-width="4"/>
    
    <!-- Document Content lines -->
    <line x1="70" y1="60" x2="260" y2="60" stroke="#eceff1" stroke-width="15"/>
    <line x1="70" y1="100" x2="260" y2="100" stroke="#eceff1" stroke-width="15"/>
    <line x1="70" y1="140" x2="200" y2="140" stroke="#eceff1" stroke-width="15"/>
    
    <text x="70" y="240" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="#2c3e50">2026</text>
    <text x="70" y="290" font-family="Arial, sans-serif" font-size="30" font-weight="normal" fill="#546e7a">기능개선 준비</text>
  </g>
  
  <!-- Title label -->
  <rect x="50" y="520" width="1100" height="80" rx="10" fill="#5d4037"/>
  <text x="600" y="575" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="white" text-anchor="middle">점심시간 한 시간의 흐름 — 2026</text>
</svg>
