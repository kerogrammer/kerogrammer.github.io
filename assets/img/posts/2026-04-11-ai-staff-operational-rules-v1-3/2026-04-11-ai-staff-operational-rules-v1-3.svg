<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0f172a"/>
  
  <!-- Grid pattern for tech feel -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)" />
  
  <!-- Glow effect -->
  <circle cx="600" cy="300" r="300" fill="#38bdf8" opacity="0.1"/>
  
  <!-- Robot Icon / AI Symbol -->
  <g transform="translate(600, 250)">
    <!-- Shield Background -->
    <path d="M 0 -180 L 150 -100 L 150 50 C 150 150 0 220 0 220 C 0 220 -150 150 -150 50 L -150 -100 Z" fill="#1e293b" stroke="#38bdf8" stroke-width="8"/>
    
    <!-- Robot Head -->
    <rect x="-70" y="-80" width="140" height="110" rx="20" fill="#38bdf8"/>
    <rect x="-50" y="-60" width="100" height="70" rx="10" fill="#0f172a"/>
    <!-- Eyes -->
    <circle cx="-25" cy="-25" r="10" fill="#38bdf8">
      <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite" />
    </circle>
    <circle cx="25" cy="-25" r="10" fill="#38bdf8">
      <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite" />
    </circle>
    
    <!-- Antennas -->
    <line x1="0" y1="-80" x2="0" y2="-120" stroke="#38bdf8" stroke-width="6"/>
    <circle cx="0" cy="-125" r="8" fill="#38bdf8"/>
    
    <!-- Version Tag -->
    <rect x="40" y="80" width="100" height="50" rx="10" fill="#f43f5e"/>
    <text x="90" y="115" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle">v1.3</text>
  </g>
  
  <!-- Main Title -->
  <text x="600" y="540" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="white" text-anchor="middle">AI 직원 운영 규정</text>
  <text x="600" y="590" font-family="Arial, sans-serif" font-size="30" font-weight="normal" fill="#94a3b8" text-anchor="middle">RULES &amp; REGULATIONS MIGRATION</text>
  
  <!-- Decorative Corner Elements -->
  <path d="M 50 100 L 50 50 L 100 50" fill="none" stroke="#38bdf8" stroke-width="4"/>
  <path d="M 1100 100 L 1100 50 L 1050 50" fill="none" stroke="#38bdf8" stroke-width="4"/>
</svg>
