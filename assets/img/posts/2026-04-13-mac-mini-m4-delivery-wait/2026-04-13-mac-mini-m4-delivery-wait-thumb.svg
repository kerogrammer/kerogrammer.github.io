<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">맥 미니 배송 대기 썸네일</title>
  <desc id="desc">OpenClaw를 써보려고 주문한 맥 미니 M4가 배송 준비 중 상태에 머물러 있는 상황을 표현한 블로그 썸네일</desc>
  <rect width="1200" height="630" fill="#F4F4F1"/>
  <rect x="44" y="44" width="1112" height="542" rx="34" fill="url(#bg)"/>
  <circle cx="1006" cy="122" r="72" fill="#E9EDF3"/>
  <circle cx="1006" cy="122" r="48" fill="#FFFFFF"/>
  <path d="M1006 90V126L1032 142" stroke="#111111" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="92" y="170" fill="#111111" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">AI 시작하려고 샀는데</text>
  <text x="92" y="246" fill="#111111" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="700">맥 미니 배송이</text>
  <text x="92" y="326" fill="#111111" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="700">너무 오래 걸린다</text>

  <text x="94" y="392" fill="#3F4650" font-family="Arial, Helvetica, sans-serif" font-size="28">주문일 2026.03.24  /  확인일 2026.04.13  /  상태: 처리 중</text>

  <g transform="translate(708 304)">
    <rect x="0" y="0" width="336" height="126" rx="18" fill="url(#metal)"/>
    <rect x="0" y="96" width="336" height="30" fill="#1D1D1F"/>
    <ellipse cx="168" cy="118" rx="142" ry="11" fill="#0F0F10"/>
    <rect x="62" y="50" width="8" height="34" rx="4" fill="#202124"/>
    <rect x="104" y="50" width="8" height="34" rx="4" fill="#202124"/>
    <circle cx="264" cy="66" r="4.5" fill="#F6F7FA"/>
    <circle cx="300" cy="66" r="7" fill="#111111"/>
  </g>

  <rect x="92" y="452" width="1016" height="58" rx="29" fill="#D9DDE2"/>
  <rect x="92" y="452" width="438" height="58" rx="29" fill="#1E8E4D"/>
  <circle cx="530" cy="481" r="19" fill="#FFFFFF"/>
  <text x="92" y="552" fill="#111111" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">도착 예정 2026.04.15 - 2026.04.22</text>

  <defs>
