<svg width="1200" height="880" viewBox="0 0 1200 880" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">맥 미니 주문 상태 요약 이미지</title>
  <desc id="desc">2026년 3월 24일 주문 접수 후 2026년 4월 15일부터 22일 사이 도착 예정으로 표시된 맥 미니 주문 화면을 바탕으로 재구성한 이미지</desc>
  <rect width="1200" height="880" fill="#F5F5F7"/>
  <rect x="32" y="24" width="1136" height="72" rx="18" fill="white"/>
  <circle cx="72" cy="60" r="12" fill="#111111"/>
  <text x="104" y="67" fill="#111111" font-family="Arial, Helvetica, sans-serif" font-size="24">스토어</text>
  <text x="220" y="67" fill="#6E6E73" font-family="Arial, Helvetica, sans-serif" font-size="24">Mac</text>
  <text x="308" y="67" fill="#6E6E73" font-family="Arial, Helvetica, sans-serif" font-size="24">iPad</text>
  <text x="414" y="67" fill="#6E6E73" font-family="Arial, Helvetica, sans-serif" font-size="24">iPhone</text>
  <text x="1012" y="67" fill="#6E6E73" font-family="Arial, Helvetica, sans-serif" font-size="22">고객지원</text>

  <rect x="32" y="120" width="1136" height="180" rx="28" fill="white"/>
  <text x="78" y="205" fill="#111111" font-family="Arial, Helvetica, sans-serif" font-size="54" font-weight="700">주문을 한눈에 확인하세요.</text>
  <text x="892" y="182" fill="#6E6E73" font-family="Arial, Helvetica, sans-serif" font-size="22">주문 번호:</text>
  <text x="892" y="220" fill="#111111" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">주문 접수: 2026년 3월 24일</text>

  <rect x="32" y="324" width="1136" height="148" rx="28" fill="#ECECF1"/>
  <text x="78" y="392" fill="#111111" font-family="Arial, Helvetica, sans-serif" font-size="25">주문을 변경하거나 제품을 반품 또는 취소하려면 Apple 계정으로 로그인하세요.</text>
  <rect x="78" y="414" width="410" height="54" rx="18" fill="#1677E6"/>
  <text x="283" y="449" text-anchor="middle" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">로그인</text>

  <rect x="32" y="498" width="1136" height="334" rx="28" fill="white"/>
  <g transform="translate(76 580)">
    <rect x="0" y="0" width="360" height="132" rx="16" fill="url(#metal)"/>
    <rect x="0" y="104" width="360" height="28" rx="0" fill="#1D1D1F"/>
    <ellipse cx="180" cy="118" rx="152" ry="10" fill="#0F0F10"/>
    <rect x="68" y="55" width="8" height="34" rx="4" fill="#202124"/>
    <rect x="114" y="55" width="8" height="34" rx="4" fill="#202124"/>
    <circle cx="282" cy="72" r="4.5" fill="#F6F7FA"/>
    <circle cx="320" cy="72" r="7" fill="#111111"/>
  </g>

  <text x="484" y="572" fill="#6E6E73" font-family="Arial, Helvetica, sans-serif" font-size="22">Mac mini</text>
  <text x="484" y="626" fill="#111111" font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="700">도착 2026/04/15 - 2026/04/22</text>

  <rect x="484" y="650" width="570" height="8" rx="4" fill="#D8D8DC"/>
  <rect x="484" y="650" width="190" height="8" rx="4" fill="#18A44C"/>
  <text x="484" y="692" fill="#6E6E73" font-family="Arial, Helvetica, sans-serif" font-size="20">주문 접수</text>
  <text x="640" y="692" fill="#111111" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">처리 중</text>
  <text x="796" y="692" fill="#6E6E73" font-family="Arial, Helvetica, sans-serif" font-size="20">출고 준비 중</text>
  <text x="938" y="692" fill="#6E6E73" font-family="Arial, Helvetica, sans-serif" font-size="20">출고됨</text>
  <text x="1062" y="692" fill="#6E6E73" font-family="Arial, Helvetica, sans-serif" font-size="20">배송됨</text>

  <text x="484" y="748" fill="#111111" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">고객님의 주문을 처리 중입니다.</text>
  <text x="484" y="788" fill="#3D3D42" font-family="Arial, Helvetica, sans-serif" font-size="22">주문하신 제품의 출고가 준비되면 배송일자를 업데이트해 드리겠습니다.</text>

  <defs>
    <linearGradient id="metal" x1="0" y1="0" x2="360" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#B8BCC3"/>
      <stop offset="0.2" stop-color="#F8F8F8"/>
      <stop offset="0.48" stop-color="#C8CBD2"/>
      <stop offset="0.72" stop-color="#F6F7F8"/>
      <stop offset="1" stop-color="#BFC3CA"/>
    </linearGradient>
  </defs>
</svg>
