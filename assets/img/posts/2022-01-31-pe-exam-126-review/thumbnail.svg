<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">정보관리기술사 126회 필기 후기 썸네일</title>
  <desc id="desc">시험지와 샤논 키워드를 강조한 정보관리기술사 126회 복기 썸네일</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e1b4b"/>
      <stop offset=".55" stop-color="#0369a1"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity=".34"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="118" y="84" width="408" height="470" rx="24" fill="#fff7ed"/>
    <rect x="166" y="140" width="220" height="24" rx="12" fill="#0f172a"/>
    <rect x="166" y="214" width="292" height="16" rx="8" fill="#94a3b8"/>
    <rect x="166" y="264" width="246" height="16" rx="8" fill="#94a3b8"/>
    <rect x="166" y="314" width="300" height="16" rx="8" fill="#94a3b8"/>
    <rect x="166" y="384" width="130" height="92" rx="14" fill="#f97316"/>
    <text x="196" y="443" font-family="Arial, sans-serif" font-size="34" font-weight="800" fill="#fff">126</text>
  </g>
  <g font-family="Arial, sans-serif" fill="#fff">
    <text x="610" y="190" font-size="46" font-weight="700">샤논의 충격을 넘어</text>
    <text x="610" y="290" font-size="84" font-weight="800">다시 마주한</text>
    <text x="610" y="382" font-size="84" font-weight="800">시험지</text>
  </g>
  <rect x="612" y="438" width="360" height="72" rx="20" fill="#fff7ed"/>
  <text x="650" y="485" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#1e1b4b">정보관리기술사 복기</text>
</svg>
