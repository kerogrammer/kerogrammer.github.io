<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">맥 미니 배송 업데이트 썸네일</title>
  <desc id="desc">맥 미니 M4의 도착 예정일이 4월 15일로 구체화된 배송 업데이트를 담은 심플한 블로그 썸네일</desc>
  <rect width="1200" height="630" fill="#F6F7F9"/>
  <rect x="48" y="48" width="1104" height="534" rx="32" fill="#FFFFFF"/>

  <text x="96" y="145" fill="#3B82F6" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">APPLE ORDER UPDATE</text>
  <text x="96" y="235" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="68" font-weight="700">맥 미니 배송 일정이</text>
  <text x="96" y="315" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="68" font-weight="700">드디어 확정됐다</text>
  <text x="98" y="376" fill="#4B5563" font-family="Arial, Helvetica, sans-serif" font-size="30">3월 24일 주문, 4월 14일 메일 수신, 4월 15일 도착 예정</text>

  <g transform="translate(96 443)">
    <rect width="300" height="72" rx="20" fill="#EEF2FF"/>
    <text x="36" y="46" fill="#1D4ED8" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">도착 예정 04.15</text>
  </g>

  <g transform="translate(785 152)">
    <rect x="0" y="0" width="255" height="326" rx="28" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="4"/>
    <circle cx="128" cy="42" r="10" fill="#D1D5DB"/>
    <text x="42" y="98" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">배송 상태</text>
    <text x="42" y="150" fill="#6B7280" font-family="Arial, Helvetica, sans-serif" font-size="24">주문일</text>
    <text x="42" y="182" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">2026.03.24</text>
    <text x="42" y="238" fill="#6B7280" font-family="Arial, Helvetica, sans-serif" font-size="24">예상 도착</text>
    <text x="42" y="270" fill="#059669" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="700">2026.04.15</text>
    <rect x="42" y="292" width="171" height="16" rx="8" fill="#D1FAE5"/>
    <rect x="42" y="292" width="132" height="16" rx="8" fill="#10B981"/>
  </g>
</svg>
