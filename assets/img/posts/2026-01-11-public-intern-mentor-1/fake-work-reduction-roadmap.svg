<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">가짜 일 줄이기 프로젝트 로드맵</title>
  <desc id="desc">관찰, 질문, 정리, 실행으로 이어지는 개선 프로젝트를 단계별 카드로 나타낸 SVG.</desc>
  <defs>
    <linearGradient id="bg" x1="60" y1="60" x2="1130" y2="660" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B132B"/>
      <stop offset="1" stop-color="#134E4A"/>
    </linearGradient>
    <linearGradient id="path" x1="208" y1="462" x2="1030" y2="462" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7DD3FC"/>
      <stop offset="1" stop-color="#6EE7B7"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="720" rx="32" fill="url(#bg)"/>
  <text x="100" y="130" fill="#F8FAFC" font-family="'Segoe UI', 'Noto Sans KR', sans-serif" font-size="40" font-weight="800">핵심 프로젝트: 가짜 일 줄이기</text>
  <text x="100" y="176" fill="#BFDBFE" font-family="'Segoe UI', 'Noto Sans KR', sans-serif" font-size="23" font-weight="500">당연하게 반복하던 일을 쪼개 보고, 질문하고, 개선 가능한 액션으로 연결하기</text>

  <path d="M214 470H986" stroke="url(#path)" stroke-width="10" stroke-linecap="round"/>

  <g>
    <circle cx="214" cy="470" r="28" fill="#7DD3FC"/>
    <rect x="124" y="276" width="180" height="144" rx="26" fill="#F8FAFC"/>
    <text x="214" y="324" text-anchor="middle" fill="#1D4ED8" font-family="'Segoe UI', 'Noto Sans KR', sans-serif" font-size="22" font-weight="700">1. 관찰</text>
    <text x="214" y="372" text-anchor="middle" fill="#0F172A" font-family="'Segoe UI', 'Noto Sans KR', sans-serif" font-size="26" font-weight="800">익숙한 업무</text>
    <text x="214" y="404" text-anchor="middle" fill="#475569" font-family="'Segoe UI', 'Noto Sans KR', sans-serif" font-size="18" font-weight="600">흐름 기록하기</text>
  </g>

  <g>
    <circle cx="470" cy="470" r="28" fill="#93C5FD"/>
    <rect x="380" y="220" width="180" height="144" rx="26" fill="#EFF6FF"/>
    <text x="470" y="268" text-anchor="middle" fill="#1D4ED8" font-family="'Segoe UI', 'Noto Sans KR', sans-serif" font-size="22" font-weight="700">2. 질문</text>
    <text x="470" y="316" text-anchor="middle" fill="#0F172A" font-family="'Segoe UI', 'Noto Sans KR', sans-serif" font-size="26" font-weight="800">왜 그렇게 하지?</text>
    <text x="470" y="348" text-anchor="middle" fill="#475569" font-family="'Segoe UI', 'Noto Sans KR', sans-serif" font-size="18" font-weight="600">의미 없는 절차 찾기</text>
  </g>

  <g>
    <circle cx="726" cy="470" r="28" fill="#6EE7B7"/>
    <rect x="636" y="276" width="180" height="144" rx="26" fill="#ECFDF5"/>
    <text x="726" y="324" text-anchor="middle" fill="#15803D" font-family="'Segoe UI', 'Noto Sans KR', sans-serif" font-size="22" font-weight="700">3. 정리</text>
    <text x="726" y="372" text-anchor="middle" fill="#0F172A" font-family="'Segoe UI', 'Noto Sans KR', sans-serif" font-size="26" font-weight="800">개선 아이디어</text>
    <text x="726" y="404" text-anchor="middle" fill="#475569" font-family="'Segoe UI', 'Noto Sans KR', sans-serif" font-size="18" font-weight="600">실행안으로 구조화</text>
  </g>

  <g>
    <circle cx="986" cy="470" r="28" fill="#34D399"/>
    <rect x="896" y="220" width="180" height="144" rx="26" fill="#D1FAE5"/>
    <text x="986" y="268" text-anchor="middle" fill="#047857" font-family="'Segoe UI', 'Noto Sans KR', sans-serif" font-size="22" font-weight="700">4. 실행</text>
    <text x="986" y="316" text-anchor="middle" fill="#0F172A" font-family="'Segoe UI', 'Noto Sans KR', sans-serif" font-size="26" font-weight="800">멘티와 검증</text>
    <text x="986" y="348" text-anchor="middle" fill="#475569" font-family="'Segoe UI', 'Noto Sans KR', sans-serif" font-size="18" font-weight="600">현장에서 계속 조정</text>
  </g>

  <rect x="166" y="560" width="868" height="82" rx="20" fill="#F8FAFC" fill-opacity="0.1" stroke="#CFFAFE" stroke-opacity="0.35"/>
  <text x="600" y="611" text-anchor="middle" fill="#F8FAFC" font-family="'Segoe UI', 'Noto Sans KR', sans-serif" font-size="30" font-weight="700">AI로 초안을 넓게 보고, 실제 현장에서 방향을 다시 검토한다.</text>
</svg>
