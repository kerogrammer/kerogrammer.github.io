<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">고경력 멘토 역할 맵</title>
  <desc id="desc">멘토가 여러 멘티와 실무 과제를 연결하는 장면을 데이터 플로우 형태로 시각화한 SVG.</desc>
  <defs>
    <linearGradient id="bg" x1="80" y1="60" x2="1120" y2="660" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1730"/>
      <stop offset="1" stop-color="#123E70"/>
    </linearGradient>
    <linearGradient id="card" x1="180" y1="136" x2="1004" y2="580" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#E0F2FE"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="720" rx="32" fill="url(#bg)"/>
  <rect x="126" y="104" width="948" height="512" rx="32" fill="url(#card)"/>
  <text x="170" y="172" fill="#0F172A" font-family="'Segoe UI', 'Noto Sans KR', sans-serif" font-size="36" font-weight="800">고경력 멘토라는 이름이 주는 묘한 무게</text>
  <text x="170" y="214" fill="#475569" font-family="'Segoe UI', 'Noto Sans KR', sans-serif" font-size="22" font-weight="500">한 사람의 멘토가 아니라, 여러 멘티와 과제 방향을 함께 잡아주는 역할</text>

  <rect x="452" y="262" width="296" height="160" rx="28" fill="#0F3A67"/>
  <text x="600" y="320" text-anchor="middle" fill="#7DD3FC" font-family="'Segoe UI', 'Noto Sans KR', sans-serif" font-size="22" font-weight="700">ME</text>
  <text x="600" y="378" text-anchor="middle" fill="#F8FAFC" font-family="'Segoe UI', 'Noto Sans KR', sans-serif" font-size="42" font-weight="900">고경력 멘토</text>

  <g>
    <rect x="178" y="294" width="192" height="112" rx="24" fill="#DBEAFE"/>
    <text x="274" y="340" text-anchor="middle" fill="#1D4ED8" font-family="'Segoe UI', 'Noto Sans KR', sans-serif" font-size="24" font-weight="700">멘티 A</text>
    <text x="274" y="376" text-anchor="middle" fill="#0F172A" font-family="'Segoe UI', 'Noto Sans KR', sans-serif" font-size="20" font-weight="600">업무 이해</text>
  </g>
  <g>
    <rect x="830" y="234" width="192" height="112" rx="24" fill="#DCFCE7"/>
    <text x="926" y="280" text-anchor="middle" fill="#15803D" font-family="'Segoe UI', 'Noto Sans KR', sans-serif" font-size="24" font-weight="700">멘티 B</text>
    <text x="926" y="316" text-anchor="middle" fill="#0F172A" font-family="'Segoe UI', 'Noto Sans KR', sans-serif" font-size="20" font-weight="600">현장 관찰</text>
  </g>
  <g>
    <rect x="830" y="386" width="192" height="112" rx="24" fill="#FCE7F3"/>
    <text x="926" y="432" text-anchor="middle" fill="#BE185D" font-family="'Segoe UI', 'Noto Sans KR', sans-serif" font-size="24" font-weight="700">멘티 C</text>
    <text x="926" y="468" text-anchor="middle" fill="#0F172A" font-family="'Segoe UI', 'Noto Sans KR', sans-serif" font-size="20" font-weight="600">개선 제안</text>
  </g>

  <path d="M370 350H432" stroke="#0F3A67" stroke-width="10" stroke-linecap="round"/>
  <path d="M768 318H830" stroke="#0F3A67" stroke-width="10" stroke-linecap="round"/>
  <path d="M768 438H830" stroke="#0F3A67" stroke-width="10" stroke-linecap="round"/>

  <g>
    <rect x="240" y="506" width="720" height="74" rx="18" fill="#0F172A" fill-opacity="0.94"/>
    <text x="600" y="553" text-anchor="middle" fill="#E2E8F0" font-family="'Segoe UI', 'Noto Sans KR', sans-serif" font-size="28" font-weight="700">"뉴비 같던 내가, 이제는 방향을 함께 정하는 쪽에 서 있구나."</text>
  </g>
</svg>
