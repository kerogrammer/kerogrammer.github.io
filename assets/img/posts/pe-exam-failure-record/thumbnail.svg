<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">정보관리기술사 연속 불합격 후기 썸네일</title>
  <desc id="desc">세 번의 시험 결과와 다시 시작하는 마음을 표현한 썸네일</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset=".55" stop-color="#7f1d1d"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity=".36"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="118" y="118" width="470" height="362" rx="28" fill="#fef2f2"/>
    <g font-family="Arial, sans-serif" font-weight="800" text-anchor="middle">
      <circle cx="230" cy="290" r="74" fill="#fee2e2"/><text x="230" y="306" font-size="42" fill="#991b1b">123</text>
      <circle cx="354" cy="290" r="74" fill="#fee2e2"/><text x="354" y="306" font-size="42" fill="#991b1b">124</text>
      <circle cx="478" cy="290" r="74" fill="#fee2e2"/><text x="478" y="306" font-size="42" fill="#991b1b">125</text>
    </g>
    <path d="M214 402c82 54 202 54 284 0" fill="none" stroke="#f59e0b" stroke-width="18" stroke-linecap="round"/>
  </g>
  <g font-family="Arial, sans-serif" fill="#fff">
    <text x="654" y="192" font-size="46" font-weight="700">덤덤함과</text>
    <text x="654" y="286" font-size="82" font-weight="800">다시 시작하는</text>
    <text x="654" y="378" font-size="82" font-weight="800">마음</text>
  </g>
  <rect x="656" y="434" width="330" height="72" rx="20" fill="#fef2f2"/>
  <text x="694" y="481" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#991b1b">3회 연속 불합격 후기</text>
</svg>
