<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">시스템 권한 관리 썸네일</title>
  <desc id="desc">신규 투입 인력의 시스템 권한을 최소 권한 원칙으로 관리하는 과정을 표현한 썸네일</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset=".52" stop-color="#155e75"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="20" flood-color="#020617" flood-opacity=".36"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g stroke="#fff" stroke-width="3" opacity=".18" fill="none">
    <path d="M234 210h276v180H234zM690 148h256v128H690zM722 382h246v112H722z"/>
    <path d="M510 300h112c68 0 68-88 68-88M510 300h128c84 0 84 138 84 138"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="112" y="124" width="390" height="382" rx="28" fill="#f8fafc"/>
    <circle cx="216" cy="236" r="58" fill="#bae6fd"/>
    <path d="M170 392c22-80 114-80 138 0" fill="#0ea5e9"/>
    <rect x="330" y="196" width="104" height="28" rx="14" fill="#22c55e"/>
    <rect x="330" y="260" width="124" height="28" rx="14" fill="#f59e0b"/>
    <rect x="330" y="324" width="82" height="28" rx="14" fill="#ef4444"/>
  </g>
  <g font-family="Arial, sans-serif" fill="#fff">
    <text x="590" y="204" font-size="46" font-weight="700">신규 인력</text>
    <text x="590" y="296" font-size="80" font-weight="800">권한 관리</text>
    <text x="590" y="384" font-size="80" font-weight="800">A to Z</text>
  </g>
  <rect x="594" y="436" width="356" height="72" rx="20" fill="#f8fafc" opacity=".94"/>
  <text x="628" y="482" font-family="Arial, sans-serif" font-size="29" font-weight="700" fill="#155e75">최소 권한의 원칙</text>
</svg>
