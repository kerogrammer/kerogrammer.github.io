name: AI Blog Auto Post

on:
  workflow_dispatch:
  schedule:
    - cron: '0 21 * * 0'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate Post
        run: |
          DATE=$(date +'%Y-%m-%d-%H%M')
          FILE="_drafts/${DATE}-ai-generated-post.md"
          mkdir -p _drafts
          echo "---" > $FILE
          echo "layout: post" >> $FILE
          echo "title: \"AI 자동 생성 포스트 테스트\"" >> $FILE
          echo "date: $(date +'%Y-%m-%d %H:%M:%S %z')" >> $FILE
          echo "categories: [AI]" >> $FILE
          echo "tags: [automation, test]" >> $FILE
          echo "description: \"AI 자동 생성 테스트 글\"" >> $FILE
          echo "---" >> $FILE
          echo "\n자동 생성된 테스트 포스트입니다." >> $FILE

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "auto: add AI generated draft"
            git pull --rebase origin main
            git push
          fi
